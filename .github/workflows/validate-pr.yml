name: Validate Pull Request

on:
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run generate script
        run: python generate.py
        continue-on-error: false
      
      - name: Validate igenaptar.json
        id: validate
        run: python validate_igenaptar.py
        continue-on-error: false
      
      - name: Comment PR with validation result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const result = context.job.status === 'success' ? '✅' : '❌';
            const message = `## ${result} Validáció eredménye\n\n`;
            const status = context.job.status === 'success' 
              ? '✅ A Pull Request-nek van esélye - szépen lement minden!'
              : '❌ Validálási hiba - kérjük, ellenőrizze a generate és validate lépéseket';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message + status
            });
